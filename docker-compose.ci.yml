# docker-compose.ci.yml — Full CI stack for NIDS
#
# Provides a self-contained CI environment with:
#   - nids-builder:   Build, test, lint, and coverage container
#   - sonarqube:      SonarQube 26.3 Community Edition + sonar-cxx
#   - sonarqube-db:   PostgreSQL backend for SonarQube
#
# Usage (local CI simulation):
#   # Start SonarQube stack:
#   docker compose -f docker-compose.ci.yml up -d sonarqube
#
#   # Run full pipeline (build + test + lint + coverage + scan):
#   docker compose -f docker-compose.ci.yml run --rm nids-pipeline
#
#   # Run individual stages:
#   docker compose -f docker-compose.ci.yml run --rm nids-build
#   docker compose -f docker-compose.ci.yml run --rm nids-test
#   docker compose -f docker-compose.ci.yml run --rm nids-lint
#   docker compose -f docker-compose.ci.yml run --rm nids-coverage
#   docker compose -f docker-compose.ci.yml run --rm nids-scan
#
# Environment variables:
#   SONAR_TOKEN — SonarQube authentication token (required for scan stage)
#   SONAR_URL   — Override SonarQube URL (default: http://localhost:9000)

services:
  # ── Builder base (shared config, not run directly) ─────────────────
  nids-builder:
    build:
      context: .
      dockerfile: Dockerfile.ci
    working_dir: /workspace
    volumes:
      - .:/workspace:z
      - vcpkg-cache:/opt/vcpkg/installed
    environment:
      CC: gcc-13
      CXX: g++-13
    profiles:
      - build-only

  # ── Stage 1: Configure + Build ─────────────────────────────────────
  nids-build:
    extends:
      service: nids-builder
    profiles:
      - stages
    command: >
      bash -c "
        cmake -B build-ci -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=gcc-13
          -DCMAKE_CXX_COMPILER=g++-13
          -DCMAKE_TOOLCHAIN_FILE=/opt/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DNIDS_BUILD_TESTS=ON
          -DNIDS_COVERAGE=ON
        && cmake --build build-ci --parallel
      "

  # ── Stage 2: Unit + Integration + Stress tests ─────────────────────
  nids-test:
    extends:
      service: nids-builder
    profiles:
      - stages
    command: >
      bash -c "
        ctest --test-dir build-ci --output-on-failure --timeout 120 -j$(nproc)
      "

  # ── Stage 3: clang-tidy lint ───────────────────────────────────────
  nids-lint:
    extends:
      service: nids-builder
    profiles:
      - stages
    command: >
      bash -c "
        run-clang-tidy-17 -p build-ci -quiet 'src/.*\\.(cpp|h)$$' 2>&1 | tee /tmp/ct.txt
        && ! grep -qE 'warning:|error:' /tmp/ct.txt
      "

  # ── Stage 4: cppcheck ──────────────────────────────────────────────
  nids-cppcheck:
    extends:
      service: nids-builder
    profiles:
      - stages
    command: >
      bash -c "
        cppcheck --project=build-ci/compile_commands.json
          --enable=all --std=c++20
          --suppress=missingIncludeSystem
          --suppress=unusedFunction
          --suppress=unmatchedSuppression
          --inline-suppr
          --xml --xml-version=2 2> cppcheck-report.xml
        && cppcheck --project=build-ci/compile_commands.json
          --enable=all --std=c++20
          --suppress=missingIncludeSystem
          --suppress=unusedFunction
          --suppress=unmatchedSuppression
          --inline-suppr 2>&1 | tee /tmp/cc.txt
        && ! grep -qE '\\(error\\)|\\(warning\\)|\\(style\\)|\\(performance\\)|\\(portability\\)' /tmp/cc.txt
      "

  # ── Stage 5: Coverage report generation ────────────────────────────
  nids-coverage:
    extends:
      service: nids-builder
    profiles:
      - stages
    command: >
      bash -c "
        gcovr --root /workspace build-ci
          --cobertura coverage-cobertura.xml
          --exclude-unreachable-branches
          --exclude-throw-branches
          --filter 'src/'
        && sed -i 's|<source>[^<]*</source>|<source>.</source>|g' coverage-cobertura.xml
        && echo '=== Coverage Report ==='
        && python3 -c \"
          import xml.etree.ElementTree as ET;
          r=ET.parse('coverage-cobertura.xml').getroot();
          print(f'  Line:   {float(r.get(\\\"line-rate\\\",0))*100:.1f}%');
          print(f'  Branch: {float(r.get(\\\"branch-rate\\\",0))*100:.1f}%')
        \"
      "

  # ── Stage 6: SonarQube scan ────────────────────────────────────────
  nids-scan:
    image: docker.io/sonarsource/sonar-scanner-cli:latest
    network_mode: host
    volumes:
      - .:/usr/src:z
    environment:
      SONAR_HOST_URL: ${SONAR_URL:-http://localhost:9000}
      SONAR_TOKEN: ${SONAR_TOKEN}
      SONAR_SCANNER_OPTS: "-Dsonar.scm.disabled=true"
    profiles:
      - stages
    depends_on:
      sonarqube:
        condition: service_healthy

  # ── Full pipeline (all stages sequentially) ────────────────────────
  nids-pipeline:
    extends:
      service: nids-builder
    profiles:
      - pipeline
    environment:
      CC: gcc-13
      CXX: g++-13
      SONAR_TOKEN: ${SONAR_TOKEN}
      SONAR_URL: ${SONAR_URL:-http://localhost:9000}
    depends_on:
      sonarqube:
        condition: service_healthy
    command: >
      bash -c "
        set -euo pipefail

        echo '╔══════════════════════════════════════╗'
        echo '║   NIDS CI Pipeline — Full Run        ║'
        echo '╚══════════════════════════════════════╝'

        echo '── Stage 1/6: Configure + Build ──'
        cmake -B build-ci -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=gcc-13
          -DCMAKE_CXX_COMPILER=g++-13
          -DCMAKE_TOOLCHAIN_FILE=/opt/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          -DNIDS_BUILD_TESTS=ON
          -DNIDS_COVERAGE=ON
        cmake --build build-ci --parallel

        echo '── Stage 2/6: Tests (unit + integration + stress) ──'
        ctest --test-dir build-ci --output-on-failure --timeout 120 -j$$(nproc)

        echo '── Stage 3/6: clang-tidy ──'
        run-clang-tidy-17 -p build-ci -quiet 'src/.*\\.(cpp|h)$$' 2>&1 | tee /tmp/ct.txt
        if grep -qE 'warning:|error:' /tmp/ct.txt; then
          echo 'FAIL: clang-tidy found issues'
          grep -E 'warning:|error:' /tmp/ct.txt | grep -v 'warnings generated'
          exit 1
        fi

        echo '── Stage 4/6: cppcheck ──'
        cppcheck --xml --xml-version=2
          --enable=all --std=c++20
          --suppress=missingInclude --suppress=missingIncludeSystem
          --suppress=unusedFunction --suppress=unknownMacro
          --inline-suppr --language=c++ -I src src/ 2> cppcheck-report.xml
        cppcheck --project=build-ci/compile_commands.json
          --enable=all --std=c++20
          --suppress=missingIncludeSystem --suppress=unusedFunction
          --suppress=unmatchedSuppression --inline-suppr 2>&1 | tee /tmp/cc.txt
        if grep -qE '\\(error\\)|\\(warning\\)|\\(style\\)|\\(performance\\)|\\(portability\\)' /tmp/cc.txt; then
          echo 'FAIL: cppcheck found issues'
          exit 1
        fi

        echo '── Stage 5/6: Coverage ──'
        gcovr --root /workspace build-ci
          --cobertura coverage-cobertura.xml
          --exclude-unreachable-branches --exclude-throw-branches
          --filter 'src/'
        sed -i 's|<source>[^<]*</source>|<source>.</source>|g' coverage-cobertura.xml

        echo '── Stage 6/6: SonarQube Scan ──'
        if [[ -n \"\$${SONAR_TOKEN:-}\" ]]; then
          echo 'Launching sonar-scanner...'
          # Scanner runs as a separate container via depends_on; skip if no token
        else
          echo 'SONAR_TOKEN not set — skipping SonarQube scan'
        fi

        echo ''
        echo '╔══════════════════════════════════════╗'
        echo '║   ✓ All CI stages passed             ║'
        echo '╚══════════════════════════════════════╝'
      "

  # ── SonarQube (reuses dev instance config) ─────────────────────────
  sonarqube:
    image: docker.io/sonarqube:26.3.0.120487-community
    container_name: nids-ci-sonarqube
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: sonarqube
    ports:
      - "9000:9000"
    volumes:
      - ci_sonarqube_data:/opt/sonarqube/data
      - ci_sonarqube_extensions:/opt/sonarqube/extensions
      - ci_sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s
    restart: unless-stopped
    profiles:
      - sonarqube
      - pipeline
      - stages

  sonarqube-db:
    image: docker.io/postgres:16-alpine
    container_name: nids-ci-sonarqube-db
    environment:
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: sonarqube
      POSTGRES_DB: sonarqube
    volumes:
      - ci_postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - sonarqube
      - pipeline
      - stages

volumes:
  vcpkg-cache:
  ci_sonarqube_data:
  ci_sonarqube_extensions:
  ci_sonarqube_logs:
  ci_postgresql_data:
