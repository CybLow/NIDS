services:
  nids:
    build:
      context: ../..
      dockerfile: docker/app/Dockerfile
    container_name: nids
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ../../data/reports:/app/reports
      - ../../data/captures:/app/captures
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    restart: unless-stopped
