version: "3.8"

services:
  nids:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nids
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./data/reports:/app/reports
      - ./data/captures:/app/captures
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes_from: []
    restart: unless-stopped

  # Future: headless server mode
  # nids-server:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.server
  #   container_name: nids-server
  #   network_mode: host
  #   cap_add:
  #     - NET_RAW
