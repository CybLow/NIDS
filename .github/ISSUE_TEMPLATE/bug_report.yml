name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
      placeholder: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Start capture on interface eth0
        2. Send traffic with ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Detection Engine (ML/TI/Rules)
        - Packet Capture
        - Flow Extraction
        - gRPC Server
        - CLI Client
        - Qt6 GUI
        - Build/CI
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, compiler, Qt version, etc.
      placeholder: |
        - OS: Ubuntu 24.04
        - Compiler: GCC 14
        - Qt: 6.8
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Relevant log output (spdlog, crash trace, etc.)
      render: shell
