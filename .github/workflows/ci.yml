name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONAN_HOME: ${{ github.workspace }}/.conan2
  SCCACHE_GHA_ENABLED: "true"

# ════════════════════════════════════════════════════════════════════
#  Pipeline:
#
#  build-linux ──┬── lint
#                ├── cppcheck
#  build-windows ├── stress-tests
#                ├── coverage + SonarCloud
#                └── docker
#                      │
#                quality-gate
# ════════════════════════════════════════════════════════════════════

jobs:
  # ── Stage 1: Build & Test ────────────────────────────────────────

  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-linux
      - uses: mozilla-actions/sccache-action@v0.0.9

      - run: cmake --preset ci-gcc-fast
      - run: cmake --build --preset ci-gcc-fast
      - run: ctest --test-dir build/ci-gcc-fast --output-on-failure --timeout 120 --exclude-regex 'Stress'

      - uses: actions/upload-artifact@v4
        with:
          name: compile-commands
          path: build/ci-gcc-fast/compile_commands.json
          retention-days: 1

  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-windows
      - uses: mozilla-actions/sccache-action@v0.0.9

      - run: cmake --preset ci-msvc
      - run: cmake --build --preset ci-msvc
      - run: ctest --test-dir build/ci-msvc --output-on-failure --timeout 120 --exclude-regex 'Stress'

  # ── Stage 2: Analysis ────────────────────────────────────────────

  lint:
    name: clang-tidy
    needs: build-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-linux
        with:
          extra-packages: clang-18 clang-tidy-18 clang-tools-18
      - uses: mozilla-actions/sccache-action@v0.0.9

      - run: cmake --preset ci-gcc-fast

      - name: Filter MOC files & run clang-tidy
        run: |
          jq '[.[] | select(.file | test("_autogen") | not)]' \
            build/ci-gcc-fast/compile_commands.json > /tmp/cc.json
          mv /tmp/cc.json build/ci-gcc-fast/compile_commands.json

          run-clang-tidy-18 -p build/ci-gcc-fast -quiet \
            'src/.*\.(cpp|h)$' 2>&1 | tee clang-tidy.txt

          ISSUES=$(grep -cE ':\d+:\d+: (warning|error):' clang-tidy.txt || echo "0")
          if [ "$ISSUES" -gt 0 ]; then
            echo "::error::clang-tidy found $ISSUES issue(s)"
            grep -E ':\d+:\d+: (warning|error):' clang-tidy.txt
            exit 1
          fi

  cppcheck:
    name: cppcheck
    needs: build-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-linux
        with:
          extra-packages: cppcheck
      - uses: mozilla-actions/sccache-action@v0.0.9

      - run: cmake --preset ci-gcc-fast

      - name: Filter MOC files & run cppcheck
        run: |
          jq '[.[] | select(.file | test("_autogen") | not)]' \
            build/ci-gcc-fast/compile_commands.json > /tmp/cc.json
          mv /tmp/cc.json build/ci-gcc-fast/compile_commands.json

          cppcheck --project=build/ci-gcc-fast/compile_commands.json \
            --enable=all --std=c++23 --library=qt \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=unusedStructMember \
            --suppress=unmatchedSuppression \
            --inline-suppr -i build/ \
            --xml --xml-version=2 2> cppcheck-report.xml

          ERRORS=$(python3 -c "
          import xml.etree.ElementTree as ET
          errors = ET.parse('cppcheck-report.xml').getroot().find('errors')
          real = [e for e in (errors or []) if e.get('severity') != 'information']
          print(len(real))
          ")
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::cppcheck found $ERRORS issue(s)"
            python3 -c "
          import xml.etree.ElementTree as ET
          for e in ET.parse('cppcheck-report.xml').getroot().find('errors'):
              locs = e.findall('location')
              loc = f'{locs[0].get(\"file\")}:{locs[0].get(\"line\")}' if locs else '?'
              print(f'{loc}: ({e.get(\"severity\")}) {e.get(\"msg\")}')
          "
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cppcheck-report
          path: cppcheck-report.xml
          retention-days: 7

  stress-tests:
    name: Stress Tests
    needs: build-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-linux
      - uses: mozilla-actions/sccache-action@v0.0.9

      - run: cmake --preset ci-gcc-fast
      - run: cmake --build --preset ci-gcc-fast --target nids_stress_tests
      - run: |
          ctest --test-dir build/ci-gcc-fast \
            --output-on-failure --timeout 300 \
            --tests-regex 'Stress' --parallel 1

  coverage:
    name: Coverage & SonarCloud
    needs: build-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      SCCACHE_GHA_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-linux
        with:
          build-type: Debug
          extra-packages: lcov
          extra-pip: gcovr

      - name: Install SonarCloud build wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v7

      - run: cmake --preset ci-coverage

      - name: Build (wrapped for SonarCloud)
        run: build-wrapper-linux-x86-64 --out-dir bw-output cmake --build --preset ci-coverage

      - run: ctest --test-dir build/ci-coverage --output-on-failure --timeout 120

      - name: Generate coverage reports
        run: |
          lcov --capture --directory build/ci-coverage --output-file coverage.info \
            --gcov-tool gcov-14 --ignore-errors mismatch,negative,gcov
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/build/*' \
            --output-file coverage.info --ignore-errors unused

          gcovr --root . build/ci-coverage \
            --cobertura coverage-cobertura.xml --cobertura-pretty \
            --gcov-executable gcov-14 \
            --gcov-ignore-parse-errors=negative_hits.warn_once_per_file \
            --exclude-unreachable-branches --exclude-throw-branches \
            --filter 'src/' -e 'src/ui/' -e 'src/server/' -e 'src/client/'
          sed -i 's|<source>[^<]*</source>|<source>.</source>|g' coverage-cobertura.xml

      - name: Coverage threshold (65%)
        run: |
          RATE=$(python3 -c "
          import xml.etree.ElementTree as ET
          print(f'{float(ET.parse(\"coverage-cobertura.xml\").getroot().get(\"line-rate\",0))*100:.1f}')
          ")
          echo "Line coverage: ${RATE}%"
          python3 -c "import sys; sys.exit(1) if float('${RATE}') < 65 else None"

      - name: Upload to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.cfamily.build-wrapper-output=bw-output
            -Dsonar.cfamily.cobertura.reportPaths=coverage-cobertura.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            coverage.info
            coverage-cobertura.xml
          retention-days: 7

  docker:
    name: Docker
    needs: build-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: false
          tags: nids:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 3: Quality Gate ────────────────────────────────────────

  quality-gate:
    name: Quality Gate
    if: always()
    needs: [build-linux, build-windows, lint, cppcheck, stress-tests, coverage, docker]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Evaluate
        run: |
          echo "### Quality Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          FAILED=0
          check() {
            if [ "$2" = "success" ] || [ "$2" = "skipped" ]; then
              echo "| $1 | Passed |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $1 | **FAILED** |" >> "$GITHUB_STEP_SUMMARY"
              FAILED=1
            fi
          }

          check "Linux build"  "${{ needs.build-linux.result }}"
          check "Windows build" "${{ needs.build-windows.result }}"
          check "clang-tidy"   "${{ needs.lint.result }}"
          check "cppcheck"     "${{ needs.cppcheck.result }}"
          check "Stress tests" "${{ needs.stress-tests.result }}"
          check "Coverage"     "${{ needs.coverage.result }}"
          check "Docker"       "${{ needs.docker.result }}"

          [ "$FAILED" -eq 1 ] && { echo "::error::Quality gate failed"; exit 1; }
          echo "**PASSED**" >> "$GITHUB_STEP_SUMMARY"
