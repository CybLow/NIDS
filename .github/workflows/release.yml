name: Release

on:
  push:
    tags: ['v*.*.*']

env:
  CONAN_HOME: ${{ github.workspace }}/.conan2
  SCCACHE_GHA_ENABLED: "true"

jobs:
  # ── Build & Package ──────────────────────────────────────────────

  linux:
    name: Package (Linux ${{ matrix.generator }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - generator: DEB
            extra-packages: ""
          - generator: RPM
            extra-packages: rpm
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-linux
        with:
          extra-packages: ${{ matrix.extra-packages }}
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Extract version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - run: cmake --preset ci-gcc-fast -DPROJECT_VERSION_OVERRIDE=${{ steps.v.outputs.version }}
      - run: cmake --build --preset ci-gcc-fast
      - run: ctest --test-dir build/ci-gcc-fast --output-on-failure --timeout 120 --exclude-regex 'Stress'
      - run: cd build/ci-gcc-fast && cpack -G ${{ matrix.generator }}

      - uses: actions/upload-artifact@v4
        with:
          name: package-linux-${{ matrix.generator }}
          path: build/ci-gcc-fast/nids-*

  windows:
    name: Package (Windows)
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-windows
        with:
          extra-choco: nsis
      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Extract version
        id: v
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - run: cmake --preset ci-msvc -DPROJECT_VERSION_OVERRIDE=${{ steps.v.outputs.version }}
      - run: cmake --build --preset ci-msvc
      - name: Smoke test
        shell: pwsh
        run: |
          $env:PATH = @(
            "$PWD\build\ci-msvc\_deps\onnxruntime-src\lib"
            "$env:QT_ROOT_DIR\bin"
          ) -join ";" + ";$env:PATH"
          ctest --test-dir build/ci-msvc --output-on-failure --timeout 120 --exclude-regex 'Stress'

      - name: Bundle Qt DLLs
        shell: pwsh
        run: windeployqt --release --no-translations --no-opengl-sw build/ci-msvc/NIDS.exe

      - name: Package
        shell: pwsh
        run: |
          cd build/ci-msvc
          cpack -G NSIS
          cpack -G ZIP

      - uses: actions/upload-artifact@v4
        with:
          name: package-windows
          path: |
            build/ci-msvc/nids-*.exe
            build/ci-msvc/nids-*.zip

  # ── Docker ───────────────────────────────────────────────────────

  docker:
    name: Docker
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.v.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release ───────────────────────────────────────────────

  publish:
    name: GitHub Release
    needs: [linux, windows, docker]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          name: NIDS v${{ steps.v.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
          files: artifacts/*
