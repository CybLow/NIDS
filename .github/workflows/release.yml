name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  CONAN_HOME: ${{ github.workspace }}/.conan2

jobs:
  build-release:
    name: Build Release (${{ matrix.package }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: deb
            generator: DEB
            runs-on: ubuntu-24.04
          - package: rpm
            generator: RPM
            runs-on: ubuntu-24.04
          - package: tgz
            generator: TGZ
            runs-on: ubuntu-24.04

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-13 g++-13 \
            cmake ninja-build \
            libpcap-dev \
            python3-pip \
            '^libxcb.*-dev' libx11-xcb-dev libglu1-mesa-dev libxrender-dev \
            libxi-dev libxkbcommon-dev libxkbcommon-x11-dev libegl1-mesa-dev
          if [ "${{ matrix.package }}" = "rpm" ]; then
            sudo apt-get install -y --no-install-recommends rpm
          fi

      - name: Install Conan
        run: pip3 install --break-system-packages conan

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: conan-release-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-release-

      - name: Install Conan dependencies
        run: conan install . -pr:h conan/profiles/linux-ci -s build_type=Release --build=missing

      - name: Configure
        run: cmake --preset ci-gcc

      - name: Build
        run: cmake --build --preset ci-gcc

      - name: Test
        run: |
          ctest --test-dir build/ci-gcc \
            --output-on-failure --timeout 120

      - name: Package
        run: |
          cd build/ci-gcc
          cpack -G ${{ matrix.generator }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.package }}
          path: build/ci-gcc/nids-*

  docker-release:
    name: Docker Release
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    needs: [build-release, docker-release]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NIDS v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
          files: |
            artifacts/*
