# ── SonarCloud project identity ──────────────────────────────────
sonar.organization=cyblow
sonar.projectKey=CybLow_NIDS
sonar.projectName=NIDS

# ── Source layout ────────────────────────────────────────────────
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# ── Exclusions ───────────────────────────────────────────────────
sonar.exclusions=\
  **/build/**,\
  **/cmake-build-*/**,\
  **/proto/**,\
  **/node_modules/**

sonar.test.exclusions=tests/**

sonar.coverage.exclusions=\
  src/ui/**,\
  src/main.cpp,\
  src/server/**,\
  src/client/**,\
  src/infra/platform/SocketInit.cpp,\
  src/infra/platform/SocketInit.h,\
  src/infra/capture/PcapCapture.cpp,\
  src/infra/analysis/OnnxAnalyzer.cpp,\
  src/infra/analysis/OnnxAnalyzer.h,\
  src/infra/analysis/AnalyzerFactory.cpp,\
  src/infra/analysis/AnalyzerFactory.h,\
  src/core/services/IPacketAnalyzer.h,\
  src/infra/flow/TcpReassembler.cpp

# ── Rule suppressions ───────────────────────────────────────────
# e1: Qt parent-child memory model uses raw new (managed by parent)
sonar.issue.ignore.multicriteria=e1,e4,e6,e7
sonar.issue.ignore.multicriteria.e1.ruleKey=cpp:S5025
sonar.issue.ignore.multicriteria.e1.resourceKey=src/ui/**

# e4: GoogleTest TEST_F fixtures legitimately use protected members
sonar.issue.ignore.multicriteria.e4.ruleKey=cpp:S3656
sonar.issue.ignore.multicriteria.e4.resourceKey=tests/**

# e6: Qt QThread parent ownership uses raw new
sonar.issue.ignore.multicriteria.e6.ruleKey=cpp:S5025
sonar.issue.ignore.multicriteria.e6.resourceKey=src/infra/capture/**

# e7: const_cast required by ONNX Runtime C API (takes float* not const float*)
sonar.issue.ignore.multicriteria.e7.ruleKey=cpp:S859
sonar.issue.ignore.multicriteria.e7.resourceKey=src/infra/analysis/OnnxAnalyzer.cpp
