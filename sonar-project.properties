# SonarQube / SonarCloud Scanner Configuration for NIDS
# See: https://docs.sonarsource.com/sonarqube-server/latest/analyzing-source-code/scanners/sonarscanner/
#
# This file is used by:
#   1. Self-hosted SonarQube (Docker, CI job)  — uses sonar-cxx plugin
#   2. SonarCloud automatic analysis (Autoscan) — uses built-in C++ analyzer

sonar.projectKey=nids
sonar.projectName=NIDS
sonar.projectVersion=0.2.0

sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

sonar.host.url=http://localhost:9000

# C++ analysis via sonar-cxx (Community plugin, self-hosted only)
sonar.cxx.file.suffixes=.cpp,.h,.hpp,.cxx,.cc,.hh,.hxx
sonar.cxx.clangtidy.reportPaths=clang-tidy-report.txt
sonar.cxx.cppcheck.reportPaths=cppcheck-report.xml
sonar.cxx.jsonCompilationDatabase=cmake-build-debug/compile_commands.json
sonar.cxx.includeDirectories=src,/usr/include,/usr/include/c++/15,/usr/include/c++/15/x86_64-redhat-linux,/usr/lib/gcc/x86_64-redhat-linux/15/include,/usr/local/include,/usr/include/qt6,/usr/include/qt6/QtCore,/usr/include/qt6/QtGui,/usr/include/qt6/QtWidgets,/usr/include/qt6/QtTest,/usr/include/qt6/QtNetwork,/usr/include/onnxruntime,/usr/include/spdlog,/usr/include/nlohmann,/usr/include/pcap
sonar.cxx.forceIncludes=/usr/src/sonar-qt-compat.h

# Python analysis (for scripts/)
sonar.python.version=3.11

# ── File exclusions ──────────────────────────────────────────────────
# Exclude non-core files from all analysis (issues, hotspots, metrics).
# Core C++ source (src/) and tests (tests/) are the only analyzed paths.
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/cmake-build-*/**,\
  **/.opencode/**,\
  **/proto/**,\
  scripts/**,\
  .devcontainer/**,\
  docker/**,\
  .github/**,\
  tests/**,\
  src/server/**,\
  src/client/**

# ── Rule suppressions (false positives for this codebase) ────────────
#
# Qt uses parent-child memory management where `new QWidget(parent)` is
# idiomatic and correct — the parent takes ownership. S5025 flags all
# `new` as "use smart pointers" which is wrong for Qt widgets.
#
# S3630 (reinterpret_cast) is necessary in network packet parsing code
# where raw byte buffers must be cast to protocol header structs. This
# is standard practice in all C/C++ network code (libpcap, Wireshark).
#
# S6022 (std::byte) — same rationale as S3630. Network headers use
# uint8_t/unsigned char by convention; mixing std::byte with pcap APIs
# and OS network headers would require casts everywhere.
#
# S3656 (protected member variables) — GoogleTest TEST_F fixtures use
# protected members by design; SetUp/TearDown are protected virtual.
#
# S5945 (C-style char array) — network header structs must match the
# on-wire binary layout; std::string would change struct size/alignment.
#
# S3608 (explicit lambda captures) — [&] captures in small, tightly-
# scoped lambdas passed to helper functions are idiomatic and clear.
#
# S5025 in infra/capture — PcapCapture creates QThread with parent
# ownership (`new QThread(this)`), same as Qt UI pattern.
#
# S1820 (too many fields) — FlowMetadata and MainWindow legitimately
# require many members; splitting would harm cohesion.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8

sonar.issue.ignore.multicriteria.e1.ruleKey=cpp:S5025
sonar.issue.ignore.multicriteria.e1.resourceKey=src/ui/**

sonar.issue.ignore.multicriteria.e2.ruleKey=cpp:S3630
sonar.issue.ignore.multicriteria.e2.resourceKey=src/infra/**

sonar.issue.ignore.multicriteria.e3.ruleKey=cpp:S6022
sonar.issue.ignore.multicriteria.e3.resourceKey=src/infra/**

sonar.issue.ignore.multicriteria.e4.ruleKey=cpp:S3656
sonar.issue.ignore.multicriteria.e4.resourceKey=tests/**

sonar.issue.ignore.multicriteria.e5.ruleKey=cpp:S5945
sonar.issue.ignore.multicriteria.e5.resourceKey=src/infra/platform/**

sonar.issue.ignore.multicriteria.e6.ruleKey=cpp:S3608
sonar.issue.ignore.multicriteria.e6.resourceKey=**/*

sonar.issue.ignore.multicriteria.e7.ruleKey=cpp:S5025
sonar.issue.ignore.multicriteria.e7.resourceKey=src/infra/capture/**

sonar.issue.ignore.multicriteria.e8.ruleKey=cpp:S1820
sonar.issue.ignore.multicriteria.e8.resourceKey=**/*

# ── Coverage exclusions ──────────────────────────────────────────────
# Files that cannot be unit-tested: Qt UI widgets (require display
# server), entry point, platform init code, raw-socket capture
# (requires root/NET_RAW).
sonar.coverage.exclusions=\
  src/ui/**,\
  src/main.cpp,\
  src/infra/platform/SocketInit.cpp,\
  src/infra/platform/SocketInit.h,\
  src/infra/capture/PcapCapture.cpp,\
  src/infra/capture/PcapHandle.h,\
  src/infra/analysis/OnnxAnalyzer.cpp,\
  src/infra/analysis/OnnxAnalyzer.h,\
  src/infra/analysis/AnalyzerFactory.cpp,\
  src/infra/analysis/AnalyzerFactory.h,\
  src/core/services/IPacketAnalyzer.h

# Coverage (Cobertura XML — generated by gcovr from cmake -DNIDS_COVERAGE=ON build)
# sonar-cxx v2.x uses sonar.cxx.cobertura.reportPaths (NOT sonar.cxx.coverage.reportPaths)
sonar.cxx.cobertura.reportPaths=coverage-cobertura.xml
