# SonarQube Scanner Configuration for NIDS
# See: https://docs.sonarsource.com/sonarqube-server/latest/analyzing-source-code/scanners/sonarscanner/

sonar.projectKey=nids
sonar.projectName=NIDS
sonar.projectVersion=0.2.0

sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

sonar.host.url=http://localhost:9000

# C++ analysis via sonar-cxx (Community plugin)
# File suffixes recognized as C++ source
sonar.cxx.file.suffixes=.cpp,.h,.hpp,.cxx,.cc,.hh,.hxx

# Import clang-tidy results (run: clang-tidy -p cmake-build-debug src/**/*.cpp > clang-tidy-report.txt)
sonar.cxx.clangtidy.reportPaths=clang-tidy-report.txt

# Import cppcheck results (generated via: cppcheck --xml --xml-version=2 ...)
sonar.cxx.cppcheck.reportPaths=cppcheck-report.xml

# Compilation database for include resolution
sonar.cxx.jsonCompilationDatabase=cmake-build-debug/compile_commands.json

# Include directories for preprocessor (reduces parsing errors)
# Project sources + system + Qt6 + third-party
sonar.cxx.includeDirectories=src,/usr/include,/usr/include/c++/15,/usr/include/c++/15/x86_64-redhat-linux,/usr/lib/gcc/x86_64-redhat-linux/15/include,/usr/local/include,/usr/include/qt6,/usr/include/qt6/QtCore,/usr/include/qt6/QtGui,/usr/include/qt6/QtWidgets,/usr/include/qt6/QtTest,/usr/include/qt6/QtNetwork,/usr/include/onnxruntime,/usr/include/spdlog,/usr/include/nlohmann,/usr/include/pcap

# Force-include a header that defines Qt macros for sonar-cxx preprocessor
# Path relative to sonar.projectBaseDir (which is /usr/src in the scanner container)
sonar.cxx.forceIncludes=/usr/src/sonar-qt-compat.h

# Python analysis (for scripts/)
sonar.python.version=3.11

# Exclusions
sonar.exclusions=**/node_modules/**,**/build/**,**/cmake-build-*/**,**/.opencode/**,**/proto/**
sonar.test.exclusions=tests/**

# Coverage exclusions — files that cannot be unit-tested (Qt UI widgets requiring a
# display server, entry point, Phase 9 scaffolding stubs, platform init code,
# raw-socket capture requiring root/NET_RAW).
sonar.coverage.exclusions=\
  src/ui/**,\
  src/main.cpp,\
  src/server/**,\
  src/client/**,\
  src/infra/platform/SocketInit.cpp,\
  src/infra/platform/SocketInit.h,\
  src/infra/capture/PcapCapture.cpp,\
  src/infra/capture/PcapHandle.h,\
  src/infra/analysis/OnnxAnalyzer.cpp,\
  src/infra/analysis/OnnxAnalyzer.h,\
  src/infra/analysis/AnalyzerFactory.cpp,\
  src/infra/analysis/AnalyzerFactory.h,\
  src/core/services/IPacketAnalyzer.h

# Coverage (Cobertura XML — generated by gcovr from cmake -DNIDS_COVERAGE=ON build)
# sonar-cxx v2.x uses sonar.cxx.cobertura.reportPaths (NOT sonar.cxx.coverage.reportPaths)
sonar.cxx.cobertura.reportPaths=coverage-cobertura.xml
